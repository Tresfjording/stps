<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
    <title>STPS Data Rapport - Uke ${report_week}</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 10px; background-color: #f9f9f9; }
        .container { width: 100%; max-width: 980px; margin: 0 auto; background: white; padding: 10px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); box-sizing: border-box; }
        .header-logo { width: min(420px, 100%); height: auto; margin-bottom: 20px; }
        h2 { color: #333; border-bottom: 2px solid #175c5f; padding-bottom: 5px; }
        .chart-container { text-align: center; margin: 30px 0; }
        .chart-container img { width: 100%; max-width: 100%; height: auto; }
        .chart-row { width: 100%; }
        .table-wrap { width: 100%; overflow-x: auto; }
        .report-section { margin-bottom: 28px; }
        .weekly-section { margin-top: 28px; padding-top: 16px; border-top: 1px solid #d7d7d7; }
        .print-only { display: none; }
        .report-actions { display: flex; justify-content: flex-end; align-items: center; gap: 12px; margin: 6px 0 10px 0; flex-wrap: wrap; }
        .download-btn { background: #175c5f; color: #fff; text-decoration: none; padding: 8px 12px; border-radius: 6px; font-weight: 600; }
        .download-btn:hover { background: #0f4042; }
        .pdf-status { color: #555; font-size: 13px; }
        .styled-table { width: 100%; min-width: 100%; border-collapse: collapse; margin-top: 20px; table-layout: fixed; }
        .styled-table th { background-color: #175c5f; color: white; padding: 10px; text-align: center; overflow-wrap: anywhere; word-break: break-word; white-space: normal; }
        .styled-table td { padding: 10px; border-bottom: 1px solid #ddd; overflow-wrap: anywhere; word-break: break-word; white-space: normal; }
        .styled-table tr:nth-child(even) { background-color: #f2f2f2; }
        @media (max-width: 900px) {
            .styled-table th, .styled-table td { padding: 8px 6px; font-size: 12px; }
        }
        @media print {
            @page { size: A4 portrait; margin: 10mm; }
            .report-actions { display: none; }
            .weekly-section { page-break-before: always; break-before: page; border-top: 0; margin-top: 0; padding-top: 0; }
            .print-only { display: block; text-align: center; margin-bottom: 10px; }
            .header-logo { width: 200px; max-width: 200px; margin-bottom: 12px; }
            .print-only .header-logo { margin-top: 12px; }
            .styled-table th, .styled-table td { padding: 6px 5px; font-size: 11px; }
        }
    </style>
</head>

<body style="width: 100%" align="center">

<div class="container">
    <img src="st_logo_hvit_bgr.png" class="header-logo" alt="Skorgen Tippelag Logo">

</div>

    <div class="container" style="width: 100%">
        <div class="report-actions">
            <a class="download-btn" href="${report_pdf_filename}" download>Last ned PDF</a>
            <span class="pdf-status">${pdf_status_text}</span>
        </div>
        <p style="margin: 6px 0 10px 0; color: #555; font-size: 14px; text-align: right;">
            Sist oppdatert: ${report_updated_at}
        </p>

    <div class="chart-row">
        <section class="report-section summary-section">
            ${summary_section_html}
        </section>
        <section class="report-section weekly-section">
            <div class="print-only">
                <img src="st_logo_hvit_bgr.png" class="header-logo" alt="Skorgen Tippelag Logo">
            </div>
            ${weekly_section_html}
        </section>
    </div>
</body>
</html>
